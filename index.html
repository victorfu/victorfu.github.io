<!DOCTYPE html>
<html lang="en">

<head>
    <title>Victor Fu | Engineer, Entrepreneur, Dad</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="Victor Fu, Engineer, Entrepreneur, VP of Engineering" />
    <meta name="description"
        content="Victor Fu - Engineer, Entrepreneur, VP of Engineering, and a proud dad who loves building things." />
    <meta name="robots" content="index,follow" />
    <meta name="application-name" content="Victor Fu" />
    <meta name="apple-mobile-web-app-title" content="Victor Fu" />
    <meta name="summary" content="Engineer, Entrepreneur, VP of Engineering, Dad" />

    <!-- Favicon -->
    <link rel="icon" href="assets/images/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon-16x16.png">
    <!-- Apple -->
    <link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png">
    <!-- Manifest -->
    <link rel="manifest" href="assets/images/site.webmanifest">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"

        crossorigin="anonymous" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .logo {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1.5rem;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .name {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .tagline {
            font-size: 1.1rem;
            color: #555;
            font-weight: 400;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .roles {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .role {
            background: #f0f0f0;
            color: #333;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.01em;
        }

        .social-links {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            margin-top: 0.5rem;
        }

        .social-links a {
            color: #555;
            font-size: 1.4rem;
            transition: color 0.2s ease, transform 0.2s ease;
        }

        .social-links a:hover {
            color: #1a1a1a;
            transform: translateY(-2px);
        }

        @media (max-width: 480px) {
            .logo {
                width: 120px;
                height: 120px;
            }

            .name {
                font-size: 1.8rem;
            }

            .tagline {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="logo.png" alt="Victor Fu" class="logo">
        <h1 class="name">Victor Fu</h1>
        <p class="tagline">Building products, leading teams, and raising a daughter I adore.</p>
        <div class="roles">
            <span class="role">Engineer</span>
            <span class="role">Entrepreneur</span>
            <span class="role">VP of Engineering</span>
            <span class="role">Proud Dad</span>
        </div>
        <div class="social-links">
            <a href="https://github.com/victorfu" target="_blank" rel="noopener" aria-label="GitHub">
                <i class="fab fa-github"></i>
            </a>
        </div>
    </div>
</body>

</html>
